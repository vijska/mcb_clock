<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Часы Маня-Мира v3.4 (Стабильная синхронизация)</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            background: #1e1e1e;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #333;
            width: 400px;
        }
        .date {
            font-size: 2.5rem;
            font-weight: bold;
            color: #00ffcc;
            margin-bottom: 5px;
        }
        .time {
            font-size: 3.8rem;
            font-weight: bold;
            color: #ffaa00;
            font-family: monospace;
            margin-bottom: 25px;
        }
        .timezone-select {
            background: #2a2a2a;
            color: #fff;
            border: 1px solid #444;
            padding: 10px 15px;
            border-radius: 5px;
            font-size: 1.1rem;
            outline: none;
            cursor: pointer;
            width: 100%;
            font-family: monospace;
            margin-bottom: 15px;
        }
        .sync-status {
            font-size: 0.8rem;
            color: #666;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="date" id="world-date">Синхронизация...</div>
    <div class="time" id="world-time">--:-- часы</div>
    
    <select id="tz" class="timezone-select" onchange="updateWorldTime()"></select>
    <div class="sync-status" id="sync-status">Сверяю часы с интернет-сервером...</div>
</div>

<script>
    const DAY_MS = 10000000;          
    const YEAR_DAYS = 325;            
    const YEAR_MS = DAY_MS * YEAR_DAYS; 
    const HOUR_MS = 400000; 

    const START_REAL_MS = Date.UTC(2026, 6, 14, 0, 0, 0); 
    const VIRTUAL_OFFSET_MS = 6 * YEAR_MS;

    let timeCorrectionOffset = 0; 

    // Генерируем часовые зоны от VŚ-12 до VŚ+12
    const select = document.getElementById('tz');
    for (let i = -12; i <= 12; i++) {
        let opt = document.createElement('option');
        opt.value = i;
        let zoneName = "VŚ" + (i > 0 ? `+${i}` : (i < 0 ? `${i}` : ''));
        opt.innerText = zoneName;
        if (i === 0) opt.selected = true; 
        select.appendChild(opt);
    }

    // Сверхстабильный метод проверки времени через заголовки серверов
    function syncWithInternet() {
        const statusEl = document.getElementById('sync-status');
        
        // Делаем легкий фоновый запрос к крупному открытому сервису
        // HEAD запрос не скачивает страницу, а только берет заголовки с временем
        fetch(window.location.href, { method: 'HEAD' })
        .then(response => {
            // Пытаемся взять системное время сервера, если файл запущен на хостинге
            let serverDateStr = response.headers.get('Date');
            parseAndApplyTime(serverDateStr);
        })
        .catch(() => {
            // Если файл запущен локально на ПК, берем резервный CORS-прокси к Google/Yandex
            fetch('https://httpbin.org/get')
            .then(res => {
                let serverDateStr = res.headers.get('Date');
                parseAndApplyTime(serverDateStr);
            })
            .catch(() => {
                statusEl.innerText = "Сервер недоступен. Используются часы ПК.";
                statusEl.style.color = '#ff4444';
            });
        });
    }

    function parseAndApplyTime(dateStr) {
        const statusEl = document.getElementById('sync-status');
        if (!dateStr) {
            statusEl.innerText = "Синхронизировано по внутреннему таймеру.";
            return;
        }

        const internetTimeMs = Date.parse(dateStr);
        const deviceTimeMs = Date.now();

        timeCorrectionOffset = internetTimeMs - deviceTimeMs;

        if (Math.abs(timeCorrectionOffset) > 2000) {
            statusEl.innerText = `Синхронизировано по сети. Коррекция ПК: ${(timeCorrectionOffset / 1000).toFixed(0)} сек.`;
            statusEl.style.color = '#ffaa00';
        } else {
            statusEl.innerText = "Синхронизировано по сети. Часы ПК идут точно.";
            statusEl.style.color = '#00ff55';
        }
    }

    function updateWorldTime() {
        const accurateNow = Date.now() + timeCorrectionOffset;
        const selectedZone = parseInt(document.getElementById('tz').value) || 0;
        const zoneOffsetMs = selectedZone * HOUR_MS;

        let totalWorldMs = (accurateNow - START_REAL_MS) + VIRTUAL_OFFSET_MS + zoneOffsetMs;

        let currentYear = Math.floor(totalWorldMs / YEAR_MS) + 1;
        let currentDay = Math.floor((totalWorldMs % YEAR_MS) / DAY_MS) + 1;

        if (totalWorldMs < 0) {
            let positiveDays = Math.floor(totalWorldMs / DAY_MS);
            currentYear = Math.floor(positiveDays / YEAR_DAYS) + 7;
            currentDay = (positiveDays % YEAR_DAYS) + YEAR_DAYS + 1;
            if (currentDay > YEAR_DAYS) {
                currentDay -= YEAR_DAYS;
                currentYear += 1;
            }
        }

        let dayProgressMs = ((totalWorldMs % DAY_MS) + DAY_MS) % DAY_MS; 
        const currentHour = Math.floor(dayProgressMs / HOUR_MS);

        const hourProgress = (dayProgressMs % HOUR_MS) / HOUR_MS;
        const currentMinute = Math.floor(hourProgress * 100);

        const displayHour = currentHour.toString().padStart(2, '0');
        const displayMinute = currentMinute.toString().padStart(2, '0');

        document.getElementById('world-date').innerText = `${currentYear} год, ${currentDay} день`;
        document.getElementById('world-time').innerText = `${displayHour}:${displayMinute} часы`;
    }

    updateWorldTime();
    setInterval(updateWorldTime, 100);

    // Запуск процесса синхронизации
    syncWithInternet();
    setInterval(syncWithInternet, 600000); 
</script>

</body>
</html>
